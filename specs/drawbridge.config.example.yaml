# Drawbridge declarative config.
#
# This is the heart of the project: each operation listed here becomes ONE typed,
# schema'd MCP tool. Drawbridge injects auth itself (from secret_env), refuses any
# request not described here, and never lets the model see the credential.
#
# This example mirrors specs/openapi.example.yaml and can be GENERATED from it
# (see docs/) rather than hand-written.

platforms:
  internal_tracker:
    base_url: ${TRACKER_BASE_URL}        # e.g. http://localhost:4010 (mock) or an internal host
    auth:
      type: bearer
      secret_env: TRACKER_TOKEN           # read from the environment on YOUR side; never sent to the model
    read_only: false                      # set true to refuse all non-GET operations
    operations:
      - name: list_work_items
        summary: List work items, optionally filtered by state.
        method: GET
        path: /work-items
        query:
          - { name: state, type: string, enum: [open, closed, all], default: open }

      - name: get_work_item
        summary: Get a single work item by id.
        method: GET
        path: /work-items/{id}
        params:
          - { name: id, type: integer, required: true }

      - name: create_work_item
        summary: Create a new work item.
        method: POST
        path: /work-items
        body:
          - { name: title, type: string, required: true }
          - { name: description, type: string }
          - { name: type, type: string, enum: [task, bug, feature], default: task }

# Escape hatch — disabled by default. When enabled, only the listed hosts are reachable.
raw_request:
  enabled: false
  allowed_hosts: []
