# Drawbridge declarative config — example.
#
# The heart of the project: each operation below becomes ONE typed, schema'd MCP
# tool named "<platform_key>_<operation_name>". Drawbridge injects auth itself (from
# secret_env), refuses any request not described here, and never lets the model see
# the credential.
#
# Validates against specs/drawbridge.config.schema.json. Mirrors
# specs/openapi.example.yaml and can be generated from it (see DESIGN §15).

version: 1

defaults:
  timeout_ms: 30000

platforms:
  internal_tracker:
    base_url: ${TRACKER_BASE_URL}        # e.g. http://localhost:4010 (mock) or an internal host
    auth:
      type: bearer
      secret_env: TRACKER_TOKEN          # read from the environment on YOUR side; never sent to the model
    read_only: false
    operations:
      - name: list_work_items
        description: List work items, optionally filtered by state.
        method: GET
        path: /work-items
        params:
          - { name: state, in: query, type: enum, enum: [open, closed, all], default: open }

      - name: get_work_item
        description: Get a single work item by id.
        method: GET
        path: /work-items/{id}
        params:
          - { name: id, in: path, type: integer, required: true }

      - name: create_work_item
        description: Create a new work item.
        method: POST
        path: /work-items
        params:
          - { name: title, in: body, type: string, required: true }
          - { name: description, in: body, type: string }
          - { name: type, in: body, type: enum, enum: [task, bug, feature], default: task }
